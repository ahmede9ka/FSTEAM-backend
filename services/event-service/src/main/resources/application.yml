server:
  port: ${PORT:8083}

spring:
  application:
    name: EVENT-SERVICE

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://maher:maher@localhost:27018/event_db?authSource=admin}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_HOSTNAME:${spring.application.name}}
    instance-id: ${spring.application.name}:${PORT:8083}:${random.value}
    prefer-ip-address: true
