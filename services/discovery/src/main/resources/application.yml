server:
    port: 8080
    servlet:
        context-path: /

spring:
    application:
        name: discovery

eureka:
    client:
        register-with-eureka: false
        fetch-registry: false
    server:
        enable-self-preservation: false
        wait-time-in-ms-when-sync-empty: 0
    instance:
        hostname: ${EUREKA_HOSTNAME:localhost}
        prefer-ip-address: false

management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            show-details: always