server:
    port: ${PORT:10000}  # Changed from 8761 to 10000

spring:
    application:
        name: discovery

eureka:
    client:
        register-with-eureka: false
        fetch-registry: false
    server:
        wait-time-in-ms-when-sync-empty: 0
    instance:
        hostname: ${EUREKA_HOSTNAME:${spring.application.name}}
        prefer-ip-address: true