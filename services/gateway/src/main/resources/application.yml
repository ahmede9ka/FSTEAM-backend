server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            - id: project-service
              uri: lb://PROJECT-SERVICE
              predicates:
                - Path=/projets/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}