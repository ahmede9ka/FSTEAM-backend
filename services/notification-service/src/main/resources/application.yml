server:
  port: ${PORT:8084}

spring:
  application:
    name: NOTIFICATION-SERVICE

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://maher:maher@localhost:27018/notification_db?authSource=admin}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_HOSTNAME:${spring.application.name}}
    instance-id: ${spring.application.name}:${PORT:8084}:${random.value}
    prefer-ip-address: true
