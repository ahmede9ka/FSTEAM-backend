server:
  port: ${PORT:8085}

spring:
  application:
    name: RECOMMENDATION-SERVICE

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27021/recommendation_db}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_HOSTNAME:${spring.application.name}}
    instance-id: ${spring.application.name}:${PORT:8085}:${random.value}
    prefer-ip-address: true
