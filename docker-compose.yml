version: '3.8'

services:
  discovery:
    build:
      context: ./Backendspring/services/discovery
    restart: unless-stopped

  auth-service:
    build:
      context: ./Backendspring/services/auth-service
    environment:
      - EUREKA_URL=http://discovery:8761/eureka/
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_PASSWORD=root
    depends_on:
      - mysql
      - discovery
    restart: unless-stopped

  project-service:
    build:
      context: ./Backendspring/services/project-service
    environment:
      - EUREKA_URL=http://discovery:8761/eureka/
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
    depends_on:
      - mongodb
      - discovery
    restart: unless-stopped

  backend:
    # Spring API gateway (exposed to the frontend container)
    build:
      context: ./Backendspring/services/gateway
    environment:
      - EUREKA_URL=http://discovery:8761/eureka/
    depends_on:
      - discovery
      - auth-service
      - project-service
    restart: unless-stopped

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: maher
      MONGO_INITDB_ROOT_PASSWORD: maher
    volumes:
      - mongo:/data/db
    restart: unless-stopped

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    volumes:
      - mysql:/var/lib/mysql
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo:
  mysql:
